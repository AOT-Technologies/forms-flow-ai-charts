apiVersion: {{ include "common.capabilities.deployment.apiVersion" . }}
kind: Deployment
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
spec:
  {{- $podLabels := include "common.tplvalues.merge" ( dict "values" ( list .Values.podLabels .Values.commonLabels ) "context" . ) }}
  selector:
    matchLabels: {{- include "common.labels.matchLabels" ( dict "customLabels" $podLabels "context" $ ) | nindent 6 }}
  replicas: {{ .Values.replicaCount }}
  strategy: {{- include "common.tplvalues.render" (dict "value" .Values.updateStrategy "context" $ ) | nindent 4 }}
  template:
    metadata:
      labels: {{- include "common.labels.standard" ( dict "customLabels" $podLabels "context" $ ) | nindent 8 }}
        app.kubernetes.io/component: forms-flow-mcp
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/secrets.yaml") . | sha256sum }}
        {{- if (include "forms-flow-mcp.createConfigmap" .) }}
        checksum/configuration: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- end }}
        {{- if .Values.podAnnotations }}
        {{- include "common.tplvalues.render" (dict "value" .Values.podAnnotations "context" $) | nindent 8 }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "forms-flow-mcp.serviceAccountName" . }}
      {{- include "forms-flow-mcp.imagePullSecrets" . | nindent 6 }}
      automountServiceAccountToken: {{ .Values.automountServiceAccountToken }}
      {{- if .Values.hostAliases }}
      hostAliases: {{- include "common.tplvalues.render" (dict "value" .Values.hostAliases "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.affinity }}
      affinity: {{- include "common.tplvalues.render" (dict "value" .Values.affinity "context" $) | nindent 8 }}
      {{- else }}
      affinity:
        podAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAffinityPreset "component" "jenkins-controller" "customLabels" $podLabels "context" $) | nindent 10 }}
        podAntiAffinity: {{- include "common.affinities.pods" (dict "type" .Values.podAntiAffinityPreset "component" "jenkins-controller" "customLabels" $podLabels "context" $) | nindent 10 }}
        nodeAffinity: {{- include "common.affinities.nodes" (dict "type" .Values.nodeAffinityPreset.type "key" .Values.nodeAffinityPreset.key "values" .Values.nodeAffinityPreset) | nindent 10 }}
      {{- end }}
      {{- if .Values.nodeSelector }}
      nodeSelector: {{- include "common.tplvalues.render" (dict "value" .Values.nodeSelector "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.tolerations }}
      tolerations: {{- include "common.tplvalues.render" (dict "value" .Values.tolerations "context" $) | nindent 8 }}
      {{- end }}
      {{- if .Values.schedulerName }}
      schedulerName: {{ .Values.schedulerName }}
      {{- end }}
      {{- if .Values.topologySpreadConstraints }}
      topologySpreadConstraints: {{- include "common.tplvalues.render" (dict "value" .Values.topologySpreadConstraints "context" .) | nindent 8 }}
      {{- end }}
      {{- if .Values.priorityClassName }}
      priorityClassName: {{ .Values.priorityClassName | quote }}
      {{- end }}
      {{- if .Values.podSecurityContext.enabled }}
      securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.podSecurityContext "context" $) | nindent 8 }}
      {{- end }}
      containers:       
        - name: forms-flow-mcp
          image: {{ include "forms-flow-mcp.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy | quote }}
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.containerSecurityContext "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.command "context" $) | nindent 12 }}
          {{- else if .Values.command }}
          command: {{- include "common.tplvalues.render" (dict "value" .Values.command "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.diagnosticMode.enabled }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.diagnosticMode.args "context" $) | nindent 12 }}
          {{- else if .Values.args }}
          args: {{- include "common.tplvalues.render" (dict "value" .Values.args "context" $) | nindent 12 }}
          {{- end }}
          {{- if .Values.lifecycleHooks }}
          lifecycle: {{- include "common.tplvalues.render" (dict "value" .Values.lifecycleHooks "context" $) | nindent 12 }}
          {{- end }}
          env:
          - name: MCP_OIDC_CLIENT_ID
            valueFrom:
              secretKeyRef:
                key: KEYCLOAK_CLIENTID
                name: "{{ .Values.formsflow.secret }}"
          - name: MCP_OIDC_CLIENT_SECRET
            valueFrom:
              secretKeyRef:
                key: KEYCLOAK_CLIENTSECRET
                name: "{{ .Values.formsflow.secret }}"
          - name: FORMSFLOW_API_URL
            valueFrom:
              configMapKeyRef:
                key: WEB_API_SERVICE_URL
                name: "{{ .Values.formsflow.configmap }}"      
          - name: PORT
            valueFrom:
              configMapKeyRef:
                key: PORT
                name: "{{ .Chart.Name }}"
          - name: PYTHONUNBUFFERED
            valueFrom:
              configMapKeyRef:
                key: PYTHONUNBUFFERED
                name: "{{ .Chart.Name }}"
          - name: FORWARDED_ALLOW_IPS
            valueFrom:
              configMapKeyRef:
                key: FORWARDED_ALLOW_IPS
                name: "{{ .Chart.Name }}"
          - name: API_TIMEOUT
            valueFrom:
              configMapKeyRef:
                key: API_TIMEOUT
                name: "{{ .Chart.Name }}"
          - name: MCP_OIDC_CONFIG_URL
            valueFrom:
              configMapKeyRef:
                key: KEYCLOAK_JWT_OIDC_CONFIG
                name: "{{ .Values.formsflow.configmap }}"
          - name: MCP_OIDC_BASE_URL
            valueFrom:
              configMapKeyRef:
                key: MCP_OIDC_BASE_URL
                name: "{{ .Chart.Name }}"
          - name: MCP_OIDC_ISSUER_URL
            valueFrom:
              configMapKeyRef:
                key: MCP_OIDC_ISSUER_URL
                name: "{{ .Chart.Name }}"
          - name: MCP_OIDC_REDIRECT_PATH
            valueFrom:
              configMapKeyRef:
                key: MCP_OIDC_REDIRECT_PATH
                name: "{{ .Chart.Name }}"
          - name: MCP_OIDC_SCOPES
            valueFrom:
              configMapKeyRef:
                key: MCP_OIDC_SCOPES
                name: "{{ .Chart.Name }}"
          - name: MCP_OIDC_VERIFY_ID_TOKEN
            valueFrom:
              configMapKeyRef:
                key: MCP_OIDC_VERIFY_ID_TOKEN
                name: "{{ .Chart.Name }}"
          - name: MCP_OIDC_REQUIRE_CONSENT
            valueFrom:
              configMapKeyRef:
                key: MCP_OIDC_REQUIRE_CONSENT
                name: "{{ .Chart.Name }}"
          - name: FORMIO_URL
            valueFrom:
              configMapKeyRef:
                key: FORMIO_SERVICE_URL
                name: "{{ .Values.formsflow.configmap }}"
          - name: FORMIO_ROOT_EMAIL
            valueFrom:
              secretKeyRef:
                key: FORMIO_ROOT_EMAIL
                name: "{{ .Values.formsflow.secret }}"
          - name: FORMIO_ROOT_PASSWORD
            valueFrom:
              secretKeyRef:
                key: FORMIO_ROOT_PASSWORD
                name: "{{ .Values.formsflow.secret }}"
          {{- if .Values.extraEnvVars }}
          {{- include "common.tplvalues.render" (dict "value" .Values.extraEnvVars "context" $) | nindent 8 }}
          {{- end }}
          {{- if or .Values.extraEnvVarsCM .Values.extraEnvVarsSecret }}
          envFrom:
            {{- if .Values.extraEnvVarsCM }}
            - configMapRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.extraEnvVarsCM "context" $) }}
            {{- end }}
            {{- if .Values.extraEnvVarsSecret }}
            - secretRef:
                name: {{ include "common.tplvalues.render" (dict "value" .Values.extraEnvVarsSecret "context" $) }}
            {{- end }}
          {{- end }}
          ports:
          - name: http
            containerPort: {{ .Values.containerPorts.http }}
            protocol: TCP
          {{- if .Values.resources }}
          resources: {{- toYaml .Values.resources | nindent 12 }}
          {{- else if ne .Values.resourcesPreset "none" }}
          resources: {{- include "common.resources.preset" (dict "type" .Values.resourcesPreset) | nindent 12 }}
          {{- end }}
          volumeMounts:
            {{- if .Values.extraVolumeMounts }}
            {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumeMounts "context" $) | nindent 12 }}
            {{- end }}
            {{- if .Values.sidecars }}
            {{- include "common.tplvalues.render" ( dict "value" .Values.sidecars "context" $) | nindent 8 }}
            {{- end }}
        - name: nginx
          {{- if .Values.containerSecurityContext.enabled }}
          securityContext: {{- include "common.compatibility.renderSecurityContext" (dict "secContext" .Values.containerSecurityContext "context" $) | nindent 12 }}
          {{- end }}
          image: {{ include "forms-flow-mcp.nginx.image" . }}
          ports:
            - containerPort: {{ .Values.ingress.servicePort }}
        {{- if .Values.extraVolumes }}
        {{- include "common.tplvalues.render" (dict "value" .Values.extraVolumes "context" $) | nindent 6 }}
        {{- end }}
      restartPolicy: Always