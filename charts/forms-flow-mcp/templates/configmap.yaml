apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "common.names.fullname" . }}
  namespace: {{ include "common.names.namespace" . | quote }}
  labels: {{- include "common.labels.standard" ( dict "customLabels" .Values.commonLabels "context" $ ) | nindent 4 }}
    app.kubernetes.io/component: forms-flow-mcp
  {{- if .Values.commonAnnotations }}
  annotations: {{- include "common.tplvalues.render" ( dict "value" .Values.commonAnnotations "context" $ ) | nindent 4 }}
  {{- end }}
data:
  PORT: "{{ .Values.containerPorts.http }}"
  PYTHONUNBUFFERED: "{{ .Values.pythonUnbuffered }}"
  FORWARDED_ALLOW_IPS: "{{ .Values.forwardedAllowIps }}"
  MCP_OIDC_ISSUER_URL: "{{ .Values.mcpOidcIssuerUrl }}"
  MCP_OIDC_REDIRECT_PATH: "{{ .Values.mcpOidcRedirectPath }}"
  MCP_OIDC_SCOPES: "{{ .Values.mcpOidcScopes }}"
  MCP_OIDC_VERIFY_ID_TOKEN: "{{ .Values.mcpOidcVerifyIdToken }}"
  MCP_OIDC_REQUIRE_CONSENT: "{{ .Values.mcpOidcRequireConsent }}"
  API_TIMEOUT: "{{ .Values.apiTimeout }}"
  MCP_OIDC_BASE_URL: "{{ .Values.mcpOidcBaseUrl }}"